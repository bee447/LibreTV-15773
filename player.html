<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreTV - 视频播放</title>
    <script src="libs/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        #player-container { width: 100vw; height: 100vh; position: relative; }
        video, iframe { width: 100%; height: 100%; border: none; }
        #controls {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 20px; z-index: 100;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transition: opacity 0.3s;
        }
        #player-container:hover #controls { opacity: 1; }
        #controls button {
            background: rgba(255,255,255,0.15); border: none; color: white;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            font-size: 14px; backdrop-filter: blur(4px);
        }
        #controls button:hover { background: rgba(255,255,255,0.25); }
        #source-select {
            background: rgba(255,255,255,0.15); border: none; color: white;
            padding: 8px 12px; border-radius: 6px; font-size: 13px;
            backdrop-filter: blur(4px); cursor: pointer;
        }
        #source-select option { background: #222; color: white; }
        #title-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 16px 20px;
            background: linear-gradient(rgba(0,0,0,0.85), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        #player-container:hover #title-bar { opacity: 1; }
        #title-bar h1 { color: white; font-size: 16px; margin: 0; font-weight: 500; }
        #title-bar .back-btn {
            color: white; text-decoration: none; font-size: 14px;
            opacity: 0.7; margin-right: 16px;
        }
        #title-bar .back-btn:hover { opacity: 1; }
        #loading-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        #loading-overlay .spinner {
            width: 48px; height: 48px; border: 4px solid #333;
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #f00; font-size: 18px; z-index: 60;
            text-align: center; display: none;
        }
        #manual-input {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 60; text-align: center; width: 90%; max-width: 500px;
        }
        #manual-input input {
            flex: 1; background: #222; border: 1px solid #444; color: white;
            padding: 10px 14px; border-radius: 6px; font-size: 14px;
        }
        #manual-input button {
            background: linear-gradient(135deg,#667eea,#764ba2);
            border: none; color: white; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div></div>
    <div id="error-msg"></div>

    <div id="title-bar">
        <a href="javascript:history.back()" class="back-btn">&larr; 返回</a>
        <h1 id="video-title">正在播放...</h1>
    </div>

    <div id="player-container">
        <div id="player-embed"></div>
        <div id="controls">
            <button onclick="toggleFullscreen()">全屏</button>
            <button onclick="showManualInput()">粘贴地址</button>
            <select id="source-select" onchange="switchSource(this.value)"></select>
            <span id="source-count" style="color:rgba(255,255,255,0.5);font-size:13px;margin-left:auto;"></span>
        </div>
    </div>

    <div id="manual-input">
        <p style="color:#aaa;font-size:14px;margin-bottom:8px;">影片源暂时不可用，试试粘贴其他地址</p>
        <div style="display:flex;gap:8px;">
            <input id="manualUrl" type="text" placeholder="粘贴m3u8或mp4视频地址...">
            <button onclick="playManualUrl()">播放</button>
        </div>
    </div>

    <script>
        var playerUrls = [];
        var currentIndex = 0;

        function getParams() {
            var p = new URLSearchParams(window.location.search);
            return {
                url: p.get('url') || '',
                title: p.get('title') || '正在播放...',
                source: p.get('source') || ''
            };
        }

        function loadPlayer(url) {
            var overlay = document.getElementById('loading-overlay');
            var errorMsg = document.getElementById('error-msg');
            var container = document.getElementById('player-embed');
            overlay.style.display = 'flex';
            errorMsg.style.display = 'none';
            container.innerHTML = '';

            if (!url) {
                overlay.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = '无效的播放地址';
                return;
            }

            var decodedUrl = url;
            try { decodedUrl = decodeURIComponent(url); } catch(e) {}

            if (decodedUrl.includes('.m3u8')) {
                container.innerHTML = '<video id="video-player" controls autoplay style="width:100%;height:100%;background:#000;" onerror="handleVideoError()"></video>';
                var video = document.getElementById('video-player');
                var hlsScript = document.createElement('script');
                hlsScript.src = 'libs/hls.min.js';
                hlsScript.onload = function() {
                    if (Hls.isSupported()) {
                        var hls = new Hls();
                        hls.loadSource(decodedUrl);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            overlay.style.display = 'none';
                            video.play().catch(function(){});
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = decodedUrl;
                        video.addEventListener('loadedmetadata', function() {
                            overlay.style.display = 'none';
                            video.play().catch(function(){});
                        });
                    }
                };
                hlsScript.onerror = function() {
                    if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = decodedUrl;
                        video.addEventListener('loadedmetadata', function() { overlay.style.display = 'none'; });
                    } else {
                        overlay.style.display = 'none';
                        errorMsg.style.display = 'block';
                        errorMsg.textContent = '您的浏览器不支持m3u8播放，请尝试其他视频源';
                    }
                };
                document.head.appendChild(hlsScript);
            } else {
                container.innerHTML = '<video id="video-player" controls autoplay style="width:100%;height:100%;background:#000;" onerror="handleVideoError()"><source src="' + decodedUrl.replace(/"/g,'&quot;') + '"></video>';
                var video = document.getElementById('video-player');
                video.addEventListener('loadedmetadata', function() { overlay.style.display = 'none'; });
                video.addEventListener('error', function() {
                    overlay.style.display = 'none';
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = '视频加载失败，请尝试其他源';
                });
                setTimeout(function() {
                    if (overlay.style.display !== 'none') {
                        overlay.style.display = 'none';
                    }
                }, 10000);
            }
        }

        function handleVideoError() {
            var errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'block';
            errorMsg.textContent = '视频播放出错，请尝试切换到其他播放源';
            document.getElementById('loading-overlay').style.display = 'none';
        }

        function switchSource(url) {
            currentIndex = playerUrls.indexOf(url);
            if (currentIndex < 0) currentIndex = 0;
            loadPlayer(url);
        }

        function toggleFullscreen() {
            var el = document.getElementById('player-container');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                el.requestFullscreen();
            }
        }

        function showManualInput() {
            document.getElementById('manual-input').style.display = 'block';
            document.getElementById('manualUrl').focus();
        }

        function playManualUrl() {
            var url = document.getElementById('manualUrl').value.trim();
            if (url) {
                playerUrls = [url];
                loadPlayer(url);
                document.getElementById('manual-input').style.display = 'none';
            }
        }

        function initPlayer() {
            var params = getParams();
            document.getElementById('video-title').textContent = params.title;

            try {
                var stored = localStorage.getItem('playerUrls_' + encodeURIComponent(params.title));
                if (stored) {
                    playerUrls = JSON.parse(stored);
                }
            } catch(e) {}

            if (params.url && playerUrls.indexOf(params.url) < 0) {
                playerUrls.unshift(params.url);
            }

            var select = document.getElementById('source-select');
            var countSpan = document.getElementById('source-count');
            select.innerHTML = '';
            playerUrls.forEach(function(u, i) {
                var opt = document.createElement('option');
                opt.value = u;
                opt.textContent = '播放源' + (i + 1);
                select.appendChild(opt);
            });
            countSpan.textContent = '共' + playerUrls.length + ' 个源';

            if (params.url) {
                loadPlayer(params.url);
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'f' || e.key === 'F') toggleFullscreen();
                if (e.key === 'Escape' && document.fullscreenElement) {
                    document.exitFullscreen();
                }
            });
        }

        document.getElementById('manualUrl').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') playManualUrl();
        });
        document.addEventListener('DOMContentLoaded', initPlayer);
        window.toggleFullscreen = toggleFullscreen;
        window.switchSource = switchSource;
        window.handleVideoError = handleVideoError;
        window.showManualInput = showManualInput;
        window.playManualUrl = playManualUrl;
    </script>
</body>
</html>
